services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: php
    volumes:
      - ./backend:/var/www
    networks:
      - vitabe
    depends_on:
      - postgres
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=vitabe
      - DB_USERNAME=vitabe
      - DB_PASSWORD=secret

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - vitabe
    depends_on:
      - php

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: vitabe
      POSTGRES_USER: vitabe
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vitabe

  node:
    image: node:20-alpine
    container_name: node
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    networks:
      - vitabe
    command: sh -c "npm install && npm run dev"

networks:
  vitabe:
    driver: bridge

volumes:
  pgdata:
